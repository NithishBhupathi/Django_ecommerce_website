
{% extends 'base.html' %}

{% block content %}

<h2>Your Cart</h2>

{% for item in items %}
<div class="cart-row">
    <span>{{ item.product.name }}</span>

    <div class="cart-controls">
        <a href="{% url 'decrease' item.id %}">➖</a>
        <span>{{ item.quantity }}</span>
        <a href="{% url 'increase' item.id %}">➕</a>
    </div>
</div>
{% endfor %}

<a href="{% url 'checkout' %}" class="btn">Go to Checkout</a>

{% endblock %}
